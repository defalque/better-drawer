<main class="shell grid place-items-center bg-amber-100 h-screen">
  <button (click)="leftOpen.set(!leftOpen())" class="bg-blue-500 text-white p-2 rounded-md">
    From left
  </button>
  <better-drawer [(open)]="leftOpen" position="left" />

  <button (click)="rightOpen.set(!rightOpen())" class="bg-blue-500 text-white p-2 rounded-md">
    From right
  </button>
  <better-drawer [(open)]="rightOpen" position="right" />

  <button (click)="topOpen.set(!topOpen())" class="bg-blue-500 text-white p-2 rounded-md">
    From top
  </button>
  <better-drawer [(open)]="topOpen" position="top" />

  <button (click)="bottomOpen.set(!bottomOpen())" class="bg-blue-500 text-white p-2 rounded-md">
    From bottom
  </button>
  <better-drawer [(open)]="bottomOpen" position="bottom" />
  <router-outlet />
</main>
