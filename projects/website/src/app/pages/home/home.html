<div class="grid place-items-center min-h-screen mx-auto px-4 py-12 relative">
  <div
    class="absolute inset-0 -z-10 overflow-hidden pointer-events-none backdrop-blur-sm"
    aria-hidden="true"
  >
    <!-- Full-page: pattern ripetuto (passo = lato quadrato); slice su un solo blocco non riduce mai le celle -->
    <svg
      class="block h-full w-full text-zinc-300/20 dark:text-zinc-700/8"
      preserveAspectRatio="none"
    >
      <defs>
        <pattern id="home-page-grid-tile" width="48" height="48" patternUnits="userSpaceOnUse">
          <path
            d="M 0 0 H 48 M 0 0 V 48"
            fill="none"
            stroke="currentColor"
            stroke-width="1.25"
            vector-effect="non-scaling-stroke"
          />
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#home-page-grid-tile)" />
      <line
        x1="100%"
        y1="0"
        x2="100%"
        y2="100%"
        stroke="currentColor"
        stroke-width="1.25"
        vector-effect="non-scaling-stroke"
      />
      <line
        x1="0"
        y1="100%"
        x2="100%"
        y2="100%"
        stroke="currentColor"
        stroke-width="1.25"
        vector-effect="non-scaling-stroke"
      />
    </svg>
  </div>
  <div class="flex flex-col gap-16 w-full max-w-2xl mx-auto z-100">
    <div class="flex flex-col items-center justify-center mt-42 mb-6">
      <h1
        class="text-[clamp(2.6rem,5vw,3rem)] font-bold tracking-tight text-zinc-900 dark:text-zinc-100"
      >
        Better Drawer
      </h1>
      <p
        class="sm:text-lg text-[17px] text-zinc-900/80 dark:text-zinc-50 text-center -mt-0.5 mx-auto"
      >
        A simple and customizable drawer library for
        <span
          class="bg-linear-to-r from-pink-500 to-violet-600 bg-clip-text text-lg font-bold text-transparent"
          >Angular</span
        >
        <span class="text-zinc-900/80 dark:text-zinc-50 font-mono text-[17px] ml-1 font-medium"
          >v21+</span
        >.
      </p>
      <div class="flex gap-4 mt-6">
        <app-my-drawer />
        <a
          href="https://github.com/defalque/better-drawer"
          target="_blank"
          rel="noopener noreferrer"
          class="bg-linear-to-bl from-white to-gray-100/80 dark:from-zinc-800/80 dark:to-zinc-900/80 text-black dark:text-zinc-100 px-6 py-2 rounded-lg font-semibold ring-1 ring-black/10 dark:ring-zinc-900/10 shadow-lg dark:shadow-black/50 inset-shadow-sm inset-shadow-black/3 dark:inset-shadow-zinc-100/3 cursor-pointer active:scale-95 transition-transform duration-200 focus"
        >
          Github
        </a>
      </div>
      <a
        routerLink="docs/getting-started"
        class="sm:text-[15px] text-sm text-zinc-900/70 dark:text-zinc-50/80 underline cursor-pointer underline-offset-2 mt-2"
        >Documentation</a
      >
    </div>

    <div class="grid gap-3">
      <h2 class="landing-page-h2">Installation</h2>
      <pre class="code-snippet landing-page-pre"><code
            class="hljs landing-page-code language-bash dark:text-white!"
            >npm install better-drawer</code></pre>
    </div>

    <!-- <span
      class="text-zinc-900/70 dark:text-zinc-50/80 mt-26 border-t border-dashed border-zinc-200 dark:border-zinc-800 pt-4"
    >
      By
      <a
        href="https://marcodefalco.dev"
        target="_blank"
        rel="noopener"
        class="text-orange-600 dark:text-orange-400 hover:underline underline-offset-2"
        >Marco De Falco</a
      >
    </span> -->
  </div>
</div>
